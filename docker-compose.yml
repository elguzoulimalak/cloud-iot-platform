
services:
  # --- Device Management Service ---
  device_mgmt:
    build:
      context: ./Device Management
      dockerfile: Dockerfile
    container_name: device-mgmt-ms
    environment:
      - SERVER_DB=device_db
      - NAME_DB=db_device_management
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - JWT_SECRET=mysecretkey
    ports:
      - "8001:8001"
    volumes:
      - ./Device Management:/app
      - ./Device Management/logs:/app/logs
    networks:
      - net-iot
    depends_on:
      - device_db
      - rabbitmq
      - redis

  device_db:
    image: postgres:alpine
    container_name: device_postgresql
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=db_device_management
    ports:
      - "5433:5432"
    networks:
      - net-iot

  # --- Monitoring Service ---
  monitoring:
    build:
      context: ./Monitoring
      dockerfile: Dockerfile
    container_name: monitoring-ms
    volumes:
      - ./Monitoring:/app
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=iot_monitoring
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8002:8002"
    networks:
      - net-iot
    depends_on:
      - mongo
      - rabbitmq

  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - net-iot

  # --- Signing Service ---
  signing:
    build:
      context: ./Signing
      dockerfile: Dockerfile
    container_name: signing-ms
    volumes:
      - ./Signing:/app
    environment:
      - SERVER_DB=signing_db
      - NAME_DB=db_signing
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - SECRET_KEY=mysecretkey
      - JWT_ALGORITHM=HS256
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8003:8003"
    networks:
      - net-iot
    depends_on:
      - signing_db

  signing_db:
    image: postgres:alpine
    container_name: signing_postgresql
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=db_signing
    ports:
      - "5434:5432"
    networks:
      - net-iot

  # --- Shared Infrastructure ---
  rabbitmq:
    build: ./rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
    networks:
      - net-iot

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - net-iot



  # --- API Gateway ---
  gateway:
    image: nginx:latest
    container_name: api_gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - net-iot
    depends_on:
      - device_mgmt
      - signing
      - monitoring

  # --- MQTT Bridge ---
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: mqtt_bridge
    networks:
      - net-iot
    environment:
      - BROKER_HOST=rabbitmq
      - BROKER_PORT=1883
      - API_URL=http://monitoring:8002/ingest
    depends_on:
      - rabbitmq
      - monitoring

  # --- Device Simulation ---
  simulation:
    build: ./Simulation
    container_name: iot_simulation
    networks:
      - net-iot
    environment:
      - BROKER_HOST=rabbitmq
      - BROKER_PORT=1883
      # Note: auto_runner uses /system/all to fetch devices
      # Since it runs inside docker network, it can access gateway via service name 'gateway' or 'api_gateway'
      - DEVICE_MGMT_URL=http://gateway:80/devices
    depends_on:
      - rabbitmq
      - gateway

networks:
  net-iot:
    driver: bridge
